<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Redimensionnée avec Drag & Drop</title>
<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

.drop {
    width: 300px;
    height: 150px;
    border: 2px dashed #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px 0;
    cursor: pointer;
    transition: all 0.2s;
}

.drop.hover {
    border-color: #4caf50;
    background: #f0fff4;
}

.btn {
    cursor: pointer;
    padding: 5px 10px;
    background-color: #4caf50;
    color: white;
    border-radius: 5px;
    display: inline-block;
    margin-bottom: 10px;
}

#preview {
    margin-top: 10px;
    max-width: 300px;
    border: 1px solid #ccc;
    display: block;
}
</style>
</head>
<body>

<h2>Uploader et Redimensionner une Image</h2>

<input type="file" id="fileInput" accept="image/*" hidden>
<label for="fileInput" class="btn">📁 Choisir une image</label>

<div id="dropZone" class="drop">Glissez-déposez une image ici</div>

<canvas id="canvas" hidden></canvas>
<img id="preview" alt="Image redimensionnée">

<script>
const fileInput = document.getElementById("fileInput");
const dropZone = document.getElementById("dropZone");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");

const MAX_WIDTH = 300;
const MAX_HEIGHT = 300;

// Sélection via bouton
fileInput.addEventListener("change", () => {
    traiterImage(fileInput.files[0]);
});

// Drag & Drop
dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("hover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("hover");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("hover");

    const file = e.dataTransfer.files[0];
    traiterImage(file);
});

// Fonction pour redimensionner et afficher l'image
function traiterImage(file) {
    if (!file || !file.type.startsWith("image/")) return;

    const img = new Image();
    img.onload = () => {
        let w = img.width;
        let h = img.height;

        const ratio = Math.min(MAX_WIDTH / w, MAX_HEIGHT / h, 1);
        w *= ratio;
        h *= ratio;

        canvas.width = w;
        canvas.height = h;
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);

        preview.src = canvas.toDataURL("image/jpeg", 0.9);
    };

    img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
